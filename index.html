<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>MindAR Video with Toggle Play/Pause + Close + Enable Audio</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }

  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: true"
>
  <a-assets>
    <video id="videoAsset"
           src="video.mp4"
           preload="auto"
           loop
           crossorigin="anonymous"
           playsinline
           muted>
    </video>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0" id="target">
    <!-- ✅ FIX: default aspect ratio instead of square -->
    <a-video id="arVideo"
             src="#videoAsset"
             width="1.6"
             height="0.9"
             position="0 0 0"
             visible="false">
    </a-video>
  </a-entity>

</a-scene>

<div id="enableAudioOverlay">Tap to enable audio</div>
<div id="togglePlayPauseBtn" class="btn" style="display:none;">▶</div>

<script>
window.onload = () => {
  const video = document.querySelector('#videoAsset');
  const videoEntity = document.querySelector('#arVideo');
  const target = document.querySelector('#target');

  const toggleBtn = document.getElementById('togglePlayPauseBtn');
  const closeBtn = document.getElementById('closeBtn');
  const enableAudioOverlay = document.getElementById('enableAudioOverlay');

  const posterWidth = 0.21;
  const posterHeight = 0.297;

  enableAudioOverlay.addEventListener('click', () => {
    video.muted = false;
    video.play().then(() => video.pause());
    enableAudioOverlay.style.display = 'none';

    toggleBtn.style.display = 'block';
    closeBtn.style.display = 'block';
  });

  video.addEventListener('loadedmetadata', () => {
    const videoAspectRatio = video.videoWidth / video.videoHeight;

    let videoWidth = posterWidth;
    let videoHeight = posterWidth / videoAspectRatio;

    if (videoHeight > posterHeight) {
      videoHeight = posterHeight;
      videoWidth = posterHeight * videoAspectRatio;
    }

    videoEntity.setAttribute('width', videoWidth);
    videoEntity.setAttribute('height', videoHeight);
  });

  function updateToggleBtn() {
    toggleBtn.textContent = video.paused ? '▶' : '❚❚';
  }

  toggleBtn.addEventListener('click', () => {
    if (video.paused) video.play();
    else video.pause();
    updateToggleBtn();
  });

  target.addEventListener('targetFound', () => {
    videoEntity.object3D.visible = true;
    video.play();
    updateToggleBtn();
  });

  target.addEventListener('targetLost', () => {
    video.pause();
    updateToggleBtn();
  });

  videoEntity.object3D.scale.set(1, 1, 1);
  updateToggleBtn();

  toggleBtn.style.display = 'none';
  closeBtn.style.display = 'none';
};
</script>

</body>
</html>
